<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة القروض الاحترافية</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 dark:bg-slate-900 font-[Tajawal] text-slate-800">

    <header class="text-center py-10">
        <h1 class="text-4xl font-black text-blue-600 mb-2">حاسبة التمويل العقاري الذكية</h1>
        <p class="text-slate-500">احسب أقساطك بدقة وحمل جدول السداد PDF</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 grid lg:grid-cols-12 gap-8">
        <section class="lg:col-span-5 bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
            <div class="space-y-6">
                <div>
                    <label class="block font-bold mb-2">💰 مبلغ القرض (ر.س)</label>
                    <input type="number" id="loanAmount" value="500000" class="input-field">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-bold mb-2">📈 الفائدة (%)</label>
                        <input type="number" id="interestRate" value="4.5" step="0.1" class="input-field">
                    </div>
                    <div>
                        <label class="block font-bold mb-2">⏱️ المدة (سنوات)</label>
                        <input type="number" id="loanTerm" value="25" class="input-field">
                    </div>
                </div>
                <div>
                    <label class="block font-bold mb-2">📋 رسوم إدارية</label>
                    <input type="number" id="adminFees" value="0" class="input-field">
                </div>
                <div class="flex flex-col gap-3">
                    <button id="calculateBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all">🔍 احسب الآن</button>
                    <button id="downloadPDF" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all">📥 تحميل PDF</button>
                </div>
                <div id="successMessage" class="hidden text-center text-emerald-600 bg-emerald-50 py-2 rounded-xl">✓ تم التحديث بنجاح</div>
            </div>
        </section>

        <section class="lg:col-span-7 space-y-6">
            <div class="grid sm:grid-cols-3 gap-4">
                <div class="result-card bg-blue-50 border-blue-100">
                    <span class="text-blue-600 font-bold">القسط الشهري</span>
                    <div id="monthlyPayment" class="text-2xl font-black">0</div>
                </div>
                <div class="result-card bg-emerald-50 border-emerald-100">
                    <span class="text-emerald-600 font-bold">إجمالي الفائدة</span>
                    <div id="totalInterest" class="text-2xl font-black">0</div>
                </div>
                <div class="result-card bg-slate-100 border-slate-200">
                    <span class="text-slate-600 font-bold">إجمالي السداد</span>
                    <div id="totalAmount" class="text-2xl font-black">0</div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-lg border border-slate-100 h-[400px]">
                <canvas id="loanChart"></canvas>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
