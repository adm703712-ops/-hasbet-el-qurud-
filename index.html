<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة القروض الاحترافية | حساب دقيق وجدول سداد PDF</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 dark:bg-slate-900 font-[Tajawal] min-h-screen text-slate-800 dark:text-slate-100">

    <header class="text-center py-12 px-4">
        <h1 class="text-4xl md:text-5xl font-black bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent mb-4">
            حاسبة التمويل العقاري الذكية
        </h1>
        <p class="text-slate-500 dark:text-slate-400 max-w-2xl mx-auto">أداة متطورة لحساب الأقساط الشهرية، الفوائد الإجمالية، وتوليد جداول السداد الاحترافية.</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 grid lg:grid-cols-12 gap-8 pb-20">
        
        <section class="lg:col-span-5 space-y-6">
            <div class="bg-white dark:bg-slate-800 shadow-2xl rounded-3xl p-8 border border-slate-200/50 dark:border-slate-700/50">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <span class="text-blue-600">📊</span> بيانات التمويل
                </h2>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold mb-2">مبلغ القرض (ر.س)</label>
                        <input type="number" id="loanAmount" value="500000" min="1000" class="input-field">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold mb-2">الفائدة السنوية (%)</label>
                            <input type="number" id="interestRate" value="4.5" step="0.1" class="input-field">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">المدة (سنوات)</label>
                            <input type="number" id="loanTerm" value="25" class="input-field">
                        </div>
                    </div>

                    <div class="pt-6 border-t border-slate-100 dark:border-slate-700">
                        <label class="block text-sm font-bold mb-2 text-slate-400 italic">الرسوم الإدارية (اختياري)</label>
                        <input type="number" id="adminFees" value="0" class="input-field !border-slate-200">
                    </div>

                    <button id="downloadPDF" class="w-full mt-4 bg-gradient-to-l from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-2">
                        <span>📥</span> تحميل جدول السداد (PDF)
                    </button>
                </div>
            </div>
        </section>

        <section class="lg:col-span-7 space-y-6">
            <div class="grid sm:grid-cols-3 gap-4">
                <div class="result-card bg-blue-50 dark:bg-blue-900/20 border-blue-100 dark:border-blue-800">
                    <span class="text-blue-600 dark:text-blue-400 font-bold">القسط الشهري</span>
                    <div id="monthlyPayment" class="text-2xl font-black text-blue-700 dark:text-blue-300">0</div>
                </div>
                <div class="result-card bg-emerald-50 dark:bg-emerald-900/20 border-emerald-100 dark:border-emerald-800">
                    <span class="text-emerald-600 dark:text-emerald-400 font-bold">إجمالي الفوائد</span>
                    <div id="totalInterest" class="text-2xl font-black text-emerald-700 dark:text-emerald-300">0</div>
                </div>
                <div class="result-card bg-slate-100 dark:bg-slate-800 border-slate-200 dark:border-slate-700">
                    <span class="text-slate-600 dark:text-slate-400 font-bold">إجمالي السداد</span>
                    <div id="totalAmount" class="text-2xl font-black text-slate-700 dark:text-slate-300">0</div>
                </div>
            </div>

            <div class="bg-white dark:bg-slate-800 shadow-xl rounded-3xl p-8 border border-slate-200/50 dark:border-slate-700/50 h-[400px]">
                <h3 class="text-center font-bold mb-4">توزيع هيكل التمويل</h3>
                <canvas id="loanChart"></canvas>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
